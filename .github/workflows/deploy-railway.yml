name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify RAILWAY_API_TOKEN is set
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            exit 1
          fi
          echo "RAILWAY_API_TOKEN present"

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project 21997b36-f46b-41f6-add1-bc9313a093f0 --environment production --service megaplan-brain-social-chain
          railway up --ci --detach
